<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>げんばメモ</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f5f7fa;--white:#ffffff;--text:#1a1a2e;--muted:#888;--border:#e8ecf0;--shadow:0 2px 8px rgba(0,0,0,0.08);--accent:#2563eb}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
.header{background:var(--white);padding:16px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.header-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:20px;font-weight:800}
.header-title span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.search-icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--muted)}
.lang-bar{display:flex;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
.lang-bar::-webkit-scrollbar{display:none}
.lang-btn{flex-shrink:0;padding:10px 14px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;white-space:nowrap}
.lang-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#searchArea{display:none;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.search-box{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:0 14px;gap:8px}
.search-box:focus-within{border-color:var(--accent)}
.search-input{flex:1;padding:11px 0;border:none;background:transparent;font-size:15px;color:var(--text);outline:none}
.search-input::placeholder{color:var(--muted)}
.group-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#f0f4ff;border-bottom:1px solid var(--border)}
.group-bar::-webkit-scrollbar{display:none}
.group-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 14px;border-radius:12px;border:2px solid transparent;background:var(--white);cursor:pointer;transition:all 0.15s;min-width:58px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.group-btn .g-icon{font-size:18px;line-height:1}
.group-btn .g-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.group-btn.active{background:var(--accent);border-color:var(--accent)}
.group-btn.active .g-label{color:white}
.cat-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--border)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap}
.cat-btn.active{color:white;background:var(--accent);border-color:var(--accent)}
.term-list{padding:12px 16px 80px}
.cat-header{display:flex;align-items:center;gap:8px;padding:12px 10px 8px;font-size:12px;font-weight:800;color:white;border-radius:10px;margin-bottom:6px;margin-top:10px}
.cat-header:first-child{margin-top:0}
.term-card{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border);box-shadow:var(--shadow);transition:all 0.15s;display:flex;gap:12px;align-items:center}
.term-card:active{transform:scale(0.98);box-shadow:none}
.term-ja{font-size:18px;font-weight:800;flex:1}
.term-yomi{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.term-trans{font-size:13px;color:#444;font-weight:500;margin-top:4px}
.term-kana{font-size:11px;color:var(--muted)}
.term-info{flex:1;min-width:0}
.term-arrow{color:var(--muted);font-size:18px;flex-shrink:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:8px 24px 48px;width:100%;max-width:480px;animation:slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.modal-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:white;margin-bottom:8px}
.modal-ja{font-size:34px;font-weight:900;margin-bottom:4px;line-height:1.2}
.modal-yomi{font-size:13px;color:var(--muted);margin-bottom:24px}
.modal-lang-card{background:var(--bg);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:center;border:1.5px solid var(--border)}
.modal-flag{font-size:28px;flex-shrink:0}
.modal-lang-name{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.modal-lang-text{font-size:20px;font-weight:700;line-height:1.3}
.modal-lang-kana{font-size:12px;color:var(--muted);margin-top:2px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.offline-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#f59e0b;color:white;text-align:center;padding:10px;font-size:13px;font-weight:700;z-index:300}
.offline-bar.show{display:block}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-icon" style="background:white;padding:4px">
      <img src="https://tokusin.jp/jpwp/wp-content/themes/tokushin_group_v1806/images/logo_trust.svg" style="height:26px;width:26px;object-fit:contain">
    </div>
    <div class="header-title">げんば<span>メモ</span></div>
    <div class="header-right">
      <button class="search-icon-btn" id="searchToggle">🔍</button>
    </div>
  </div>
  <div class="lang-bar" id="langBar"></div>
</div>
<div id="searchArea">
  <div class="search-box">
    <span style="color:#888;font-size:16px">🔍</span>
    <input class="search-input" type="search" placeholder="用語を検索..." id="searchBox">
  </div>
</div>
<div class="group-bar" id="groupBar"></div>
<div class="cat-bar" id="catBar"></div>
<div class="term-list" id="termList"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-badge" id="modalBadge"></div>
    <div class="modal-ja" id="modalJa"></div>
    <div class="modal-yomi" id="modalYomi"></div>
    <div id="modalLangs"></div>
  </div>
</div>
<div class="offline-bar" id="offlineBar">📴 オフライン動作中</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
